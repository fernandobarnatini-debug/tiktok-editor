name: TikTokEditor
options:
  bundleIdPrefix: com.tiktokeditor
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: NO

packages:
  WhisperKit:
    url: https://github.com/argmaxinc/WhisperKit
    from: "0.9.0"
  onnxruntime-swift-package-manager:
    url: https://github.com/microsoft/onnxruntime-swift-package-manager
    from: "1.19.0"

targets:
  TikTokEditor:
    type: application
    platform: iOS
    sources:
      - path: TikTokEditor
        excludes:
          - "Info.plist"
          - "Resources/**"
      - path: TikTokEditor/Resources/silero_vad.onnx
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tiktokeditor.app
        PRODUCT_NAME: TikTokEditor
        TARGETED_DEVICE_FAMILY: "1,2"
        GENERATE_INFOPLIST_FILE: YES
        CURRENT_PROJECT_VERSION: "1"
        MARKETING_VERSION: "0.1.0"
        INFOPLIST_KEY_CFBundleDisplayName: "TikTok Editor"
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: "We need access to your videos to process them and save the clean result."
        INFOPLIST_KEY_NSPhotoLibraryAddUsageDescription: "Save the processed clean video back to your photo library."
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_PREVIEWS: YES
        ENABLE_DEBUG_DYLIB: NO
    dependencies:
      - package: WhisperKit
        product: WhisperKit
      - package: onnxruntime-swift-package-manager
        product: onnxruntime
